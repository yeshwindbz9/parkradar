name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: dummy-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build app
        run: npm run build